name: CI & Deploy

on:
  push:
    branches:
      - dev/*
      - feat/*
      - fix/*
      - refactor/*
      - docs/*
      - test/*

    paths:
      - ".github/workflows/*"
      - "frontend/**"
      - "backend/**"
      - "docker-compose.yml"
      - ".env.*"

jobs:
  use-tests:
    if: "!contains(github.event.head_commit.message, '[skip tests]')"
    name: 🧪 Run Tests
    uses: ./.github/workflows/tests.inc.yml

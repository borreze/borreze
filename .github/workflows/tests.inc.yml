name: Run Lint & Tests

on:
  workflow_call:

jobs:
  frontend-lint:
    name: 🧹🖥️ Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Lint
        run: npm run lint
        working-directory: frontend

  frontend-tests:
    name: 🧪🖥️ Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Test
        run: npm run test
        working-directory: frontend

  backend-lint:
    name: 🧹⚙️ Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Lint
        run: npm run lint
        working-directory: backend

  backend-tests:
    name: 🧪⚙️ Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Test
        run: npm run test
        working-directory: backend
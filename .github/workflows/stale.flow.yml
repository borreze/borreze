name: Stale Issues

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # Issue without activity for 60 days will be marked as stale
          days-before-stale: 60
          # Closed 14 days after being marked stale
          days-before-close: 14

          stale-issue-label: 'waiting'
          stale-issue-message: >
            This issue has been inactive for 60 days.
            It will be closed in 14 days without activity.
            Comment or remove the label to reactivate it.

          close-issue-message: >
            Automatically closed due to inactivity.
            Reopen if still relevant.

          # Never mark stale if these labels are present
          exempt-issue-labels: 'prioritized,milestone,security'

          # Don't touch PR
          days-before-pr-stale: -1
          days-before-pr-close: -1

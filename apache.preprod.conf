# ! This Apache2 file is NOT AUTOMATICALLY GENERATED or PUSHED IN PRODUCTION AUTOMATICALLY  
# ! It is just a reference that NEEDS TO FIT THE EXACT SERVER CONFIGURATION to ensure reproductibility

<VirtualHost *:80>
    ServerName preprod.borreze.fr
    Redirect permanent / https://preprod.borreze.fr/
</VirtualHost>

<VirtualHost *:443>
    ServerName preprod.borreze.fr

    ProtocolsHonorOrder On
    Protocols h2 h2c http/1.1

    ProxyPreserveHost On
    
    # Backend
    ProxyPass /api http://127.0.0.1:4002/
    ProxyPassReverse /api http://127.0.0.1:4002/

    # PG Admin
    ProxyPass /pg-admin http://127.0.0.1:4004/
    ProxyPassReverse /pg-admin http://127.0.0.1:4004/

    # Frontend
    ProxyPass / http://127.0.0.1:4003/
    ProxyPassReverse / http://127.0.0.1:4003/

    # Caching rules for the API
    <Location /api>
        Header set Cache-Control "no-store, no-cache, must-revalidate,  proxy-revalidate, max-age=0"
        Header set Pragma "no-cache"
        Header set Expires "0"
        ProxyPassReverseCookieDomain localhost preprod.borreze.fr
        ProxyPassReverseCookiePath / /
    </Location>

    # SSL configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/borreze.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/borreze.fr/privkey.pem

    # Log files
    ErrorLog ${APACHE_LOG_DIR}/borreze-preprod_error.log
    CustomLog ${APACHE_LOG_DIR}/borreze-preprod_access.log combined
</VirtualHost>
